<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" fill="none">
  <!-- Brand Definitions: Luxury Leather & Gold HD -->
  <defs>
    <linearGradient id="leather_hd_bold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#92400e;stop-opacity:1" /> <!-- Rich Saddle Brown -->
      <stop offset="100%" style="stop-color:#451a03;stop-opacity:1" /> <!-- Deep Mahogany -->
    </linearGradient>
    <linearGradient id="gold_hd_bold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" /> <!-- Vivid Gold -->
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" /> <!-- Deep Amber -->
    </linearGradient>
    <linearGradient id="slate_hd_bold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" /> <!-- Industrial Slate -->
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <filter id="hd_glow_bold" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Industrial Frame: Bold Deep Slate Squircle -->
  <rect width="128" height="128" rx="20" fill="url(#slate_hd_bold)" />

  <!-- Enlarged Premium Leather Wallet Body -->
  <rect x="8" y="24" width="88" height="72" rx="12" fill="url(#leather_hd_bold)" stroke="#111827" stroke-width="2" />
  <path d="M8 44C8 32.9543 16.9543 24 28 24H76C87.0457 24 96 32.9543 96 44V54H8V44Z" fill="#b45309" fill-opacity="0.3" /> <!-- Leather Flap Highlight -->
  <circle cx="80" cy="64" r="6" fill="#fef08a" filter="url(#hd_glow_bold)" /> <!-- Gold Snap -->

  <!-- Enlarged Industrial Gold Currency Stack -->
  <circle cx="96" cy="88" r="28" fill="url(#gold_hd_bold)" stroke="#92400e" stroke-width="2" filter="url(#hd_glow_bold)" />
  <circle cx="84" cy="72" r="24" fill="url(#gold_hd_bold)" stroke="#92400e" stroke-width="2" filter="url(#hd_glow_bold)" />
  
  <!-- Coin Relief -->
  <path d="M86 64L92 70M82 82L88 88" stroke="#b45309" stroke-width="2" stroke-linecap="round" opacity="0.6" />
  <path d="M102 82L108 88" stroke="#b45309" stroke-width="2" stroke-linecap="round" opacity="0.6" />

  <!-- The "Pulse": Institutional Indigo Signature Core -->
  <path d="M16 112H112" stroke="#6366f1" stroke-width="8" stroke-linecap="round" opacity="0.2" />
  <path d="M16 112H44L56 100L72 124L84 112H112" stroke="#818cf8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" />
</svg>
