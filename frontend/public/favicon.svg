<svg xmlns="http://www.w3.org/2000/svg" viewBox="40 20 250 250" width="100%" height="100%">
  <defs>
    <filter id="soft-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="-3" dy="18" stdDeviation="6" flood-color="#043c2c" flood-opacity="0.35" />
    </filter>

    <g id="bundle">
      <polygon points="60,170 140,210 140,234 60,194" fill="#107456"/>
      <path d="M 60 176 L 140 216 M 60 182 L 140 222 M 60 188 L 140 228" stroke="#0a5941" stroke-width="1.5" fill="none"/>

      <polygon points="140,210 280,140 280,164 140,234" fill="#1b9d77"/>
      <path d="M 140 216 L 280 146 M 140 222 L 280 152 M 140 228 L 280 158" stroke="#127d5e" stroke-width="1.5" fill="none"/>

      <polygon points="225,167.5 195,182.5 195,206.5 225,191.5" fill="#f59e0b"/>
      <path d="M 195 188.5 L 225 173.5 M 195 194.5 L 225 179.5 M 195 200.5 L 225 185.5" stroke="#d97706" stroke-width="1.5" fill="none"/>

      <line x1="60" y1="170" x2="140" y2="210" stroke="#5eead4" stroke-width="1.5" opacity="0.6"/>
      <line x1="140" y1="210" x2="280" y2="140" stroke="#5eead4" stroke-width="1.5" opacity="0.6"/>
      <line x1="225" y1="167.5" x2="195" y2="182.5" stroke="#fcd34d" stroke-width="1.5" opacity="0.8"/>

      <g transform="matrix(1, 0.5, -1, 0.5, 200, 100)">
        <rect x="0" y="0" width="80" height="140" fill="#2dd4bf"/>
        <rect x="6" y="6" width="68" height="128" rx="3" fill="none" stroke="#14b8a6" stroke-width="2.5"/>
        <circle cx="14" cy="14" r="7" fill="#14b8a6"/>
        <circle cx="66" cy="14" r="7" fill="#14b8a6"/>
        <circle cx="14" cy="126" r="7" fill="#14b8a6"/>
        <circle cx="66" cy="126" r="7" fill="#14b8a6"/>
        <rect x="0" y="55" width="80" height="30" fill="#fbbf24"/>
        <text x="40" y="70" 
              font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" 
              font-weight="900" 
              font-size="24" 
              fill="#ffffff" 
              text-anchor="middle" 
              dominant-baseline="central" 
              transform="rotate(-90 40 70)">₹</text>
      </g>
    </g>
  </defs>

  <g transform="translate(0, 0)">
    <use href="#bundle" x="0" y="0" filter="url(#soft-shadow)"/>
    <use href="#bundle" x="12" y="-28" filter="url(#soft-shadow)"/>
    <use href="#bundle" x="-8" y="-54" filter="url(#soft-shadow)"/>
  </g>
</svg>
